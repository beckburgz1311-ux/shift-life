<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0810" />
  <meta name="description" content="SHIFT//LIFE — Andy's personal weekly roguelite." />
  <title>SHIFT//LIFE</title>
  <style>
    :root{
      color-scheme:dark;
      --bg:#09080d;--panel:#15121d;--panel2:#1b1724;--line:#332c42;
      --text:#f6f2ff;--muted:#aaa2ba;--pink:#ff4f7f;--violet:#8b6cff;
      --green:#78e0b4;--red:#ff8597;--gold:#ffd166;--blue:#72c7ff;
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box} html{min-height:100%;background:var(--bg)}
    body{margin:0;min-width:320px;min-height:100vh;color:var(--text);background:
      radial-gradient(circle at 10% 8%,rgba(139,108,255,.18),transparent 28%),
      radial-gradient(circle at 90% 16%,rgba(255,79,127,.16),transparent 26%),
      linear-gradient(180deg,#100d17 0%,#09080d 100%);}
    button{font:inherit}button:focus-visible{outline:3px solid #a893ff;outline-offset:3px}
    .app{width:min(1180px,calc(100% - 22px));margin:auto;padding:12px 0 64px}
    .panel{background:linear-gradient(160deg,rgba(28,23,38,.97),rgba(18,15,25,.96));border:1px solid var(--line);border-radius:22px;box-shadow:0 24px 70px rgba(0,0,0,.32)}
    .top{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:19px 22px;position:sticky;top:8px;z-index:5;backdrop-filter:blur(16px)}
    .brand{font-weight:950;letter-spacing:-.06em;font-size:clamp(1.7rem,5vw,3.2rem);line-height:.9}.brand b{color:var(--pink)}
    .eyebrow{margin:0 0 7px;font-size:.72rem;font-weight:900;letter-spacing:.17em;color:#c6b9ff}
    h1,h2,h3,p{margin-top:0}.top h2{margin:0;font-size:clamp(1.2rem,4vw,2.1rem)}.top h2 span{color:var(--muted);font-size:.55em;font-weight:700}
    .controls{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:8px}
    .btn{border:1px solid var(--line);border-radius:12px;padding:10px 14px;color:var(--text);background:#211c2b;cursor:pointer;font-weight:800;transition:.15s transform,.15s border-color,.15s background}
    .btn:hover{transform:translateY(-2px);border-color:#6f5a94}.btn.primary{border:0;background:linear-gradient(135deg,var(--pink),var(--violet))}.btn.ghost{background:transparent;color:var(--muted)}
    .hero{padding:clamp(30px,7vw,76px);margin-top:12px}.hero h1{font-size:clamp(3.3rem,13vw,8.8rem);line-height:.83;letter-spacing:-.085em;margin-bottom:23px}.hero h1 b{color:var(--pink)}
    .hero .lead{font-size:clamp(1.2rem,3vw,2rem);max-width:780px;color:#ddd5ee;line-height:1.35}.hero .copy{max-width:720px;color:var(--muted);line-height:1.65}
    .section{padding:24px;margin-top:14px}.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:18px}.section-head h2{margin:0;font-size:clamp(1.45rem,4vw,2.3rem)}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .card{width:100%;min-height:160px;text-align:left;border:1px solid var(--line);border-radius:17px;background:linear-gradient(145deg,#221d2d,#17131f);color:var(--text);padding:18px;cursor:pointer;display:flex;flex-direction:column;align-items:flex-start;transition:.16s transform,.16s border-color,.16s background}
    .card:hover{transform:translateY(-3px);border-color:#7f64ad;background:linear-gradient(145deg,#2d2440,#1d1728)}.card strong{font-size:1.06rem}.card p{color:var(--muted);line-height:1.45;margin:9px 0 16px}.card .effects{margin-top:auto}
    .tag,.fx,.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;font-size:.72rem;font-weight:900;margin:3px 4px 0 0;background:rgba(255,255,255,.035)}
    .fx.good{color:var(--green)}.fx.bad{color:var(--red)}.pill{font-size:.8rem;padding:8px 11px;color:#ddd5ee}
    .stats{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:9px;margin:14px 0}.stat{padding:13px;border:1px solid var(--line);border-radius:15px;background:var(--panel2)}.stat.danger{border-color:#8e3d51;box-shadow:inset 0 0 0 1px rgba(255,79,127,.2)}
    .stat-head{display:flex;justify-content:space-between;gap:9px;font-size:.78rem}.stat-head span{color:var(--muted)}.meter{height:7px;border-radius:999px;background:#2c2638;overflow:hidden;margin-top:10px}.meter i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--violet),var(--pink))}
    .choice-layout{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(280px,.7fr);gap:14px}.activity-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.activity-grid .card{min-height:150px}
    .timeline{padding:21px}.timeline article{padding:14px 0;border-top:1px solid var(--line)}.timeline article:first-child{border-top:0}.timeline strong{display:block}.timeline p{margin:5px 0 0;color:var(--muted);line-height:1.45;font-size:.92rem}
    .event{padding:clamp(25px,6vw,58px);border-color:#5b446e;background:linear-gradient(150deg,#24182f,#15121d)}.event h2{font-size:clamp(2rem,7vw,4.6rem);line-height:.96;letter-spacing:-.045em}.event .story{max-width:760px;font-size:1.08rem;color:#d8d0e7;line-height:1.62}.event .grid{margin-top:24px}
    .boss{border-color:#7f334d;background:linear-gradient(150deg,#3a1724,#17121b)}.bossbar{margin:24px 0}.bossbar div:first-child{display:flex;justify-content:space-between;font-weight:900}.bossbar .meter{height:13px}.bossbar .meter i{background:linear-gradient(90deg,#ffad5c,#ff466e)}
    .ending{text-align:center;padding:clamp(38px,9vw,90px)}.ending h2{font-size:clamp(2.3rem,8vw,6rem);letter-spacing:-.06em;line-height:.94}.ending p{max-width:760px;margin:18px auto;color:var(--muted);font-size:1.08rem;line-height:1.7}.reward{display:inline-block;margin:10px 0 25px;padding:12px 16px;border:1px solid #6e5795;border-radius:999px;background:#241d33;font-weight:900;color:#d8ccff}
    .meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}.notice{padding:11px 14px;border:1px solid var(--line);border-radius:12px;color:var(--muted);background:#15121c}
    .hidden{display:none!important}.toast{position:fixed;right:16px;bottom:16px;z-index:20;padding:12px 16px;border-radius:12px;background:#2a2139;border:1px solid #654f86;box-shadow:0 20px 50px rgba(0,0,0,.4);font-weight:800;animation:pop .18s ease-out}@keyframes pop{from{transform:translateY(12px);opacity:0}}
    footer{text-align:center;color:#776f83;padding:26px 8px 0;font-size:.8rem}
    @media(max-width:900px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.stats{grid-template-columns:repeat(3,minmax(0,1fr))}.choice-layout{grid-template-columns:1fr}}
    @media(max-width:620px){.app{width:min(100% - 14px,1180px);padding-top:7px}.top{align-items:flex-start;position:static}.top,.section-head{flex-direction:column}.controls{justify-content:flex-start}.grid,.activity-grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}.card{min-height:138px}.hero{padding:34px 22px}.section{padding:19px}}
  </style>
</head>
<body>
<div id="app" class="app"></div>
<script>
(() => {
  'use strict';
  const SAVE_KEY='shift-life-v2';
  const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const SLOTS=['Morning','Day','Evening'];
  const META={
    energy:{label:'Energy',icon:'⚡',max:100},stress:{label:'Stress',icon:'🌀',max:100},
    family:{label:'Family',icon:'🏠',max:100},team:{label:'Team',icon:'🤝',max:100},
    creativity:{label:'Creativity',icon:'✦',max:100},cash:{label:'Cash',icon:'£',max:300}
  };
  const INTENTIONS=[
    {id:'family',name:'Family First',desc:'Protect the moments that make all the graft worth it.',fx:{family:15,energy:5,team:-4}},
    {id:'work',name:'Crush the Forecast',desc:'Push the venue hard, build the team and pray payroll behaves.',fx:{team:14,cash:25,stress:10}},
    {id:'create',name:'Creative Awakening',desc:'Turn music, THRESHOLD and game ideas into something real.',fx:{creativity:20,energy:-6,stress:5}},
    {id:'recover',name:'Recovery Week',desc:'Rest like it is part of the plan, not proof you failed.',fx:{energy:22,stress:-16,cash:-10}},
    {id:'hero',name:'Main Character Energy',desc:'A bit of progress everywhere, powered by unreasonable confidence.',fx:{energy:5,family:5,team:5,creativity:5,stress:5}},
    {id:'chaos',name:'Absolute Chaos',desc:'Mystery bonuses. Mystery damage. Very on brand.',chaos:true,fx:{}}
  ];
  const ACTIVITIES=[
    {id:'shift',title:'Run the Orange Tree',desc:'Lead the shift, rescue service and absorb the unexpected.',fx:{energy:-15,stress:12,team:12,cash:22}},
    {id:'coach',title:'Coach the Team',desc:'Develop people so Andy does not have to become the whole venue.',fx:{energy:-8,stress:-2,team:17,cash:5}},
    {id:'becky',title:'Time with Becky',desc:'Put the phone down, make an actual dinner decision and reconnect.',fx:{energy:-5,stress:-13,family:18,cash:-8}},
    {id:'kids',title:'Family Quest Night',desc:'Anime with Isla, Minecraft with Quinn, chaos with everyone.',fx:{energy:-7,stress:-10,family:17,creativity:5}},
    {id:'create',title:'Create Something',desc:'Write a song, build THRESHOLD or improve SHIFT//LIFE.',fx:{energy:-12,stress:3,creativity:21}},
    {id:'rest',title:'Actually Rest',desc:'Eat properly, switch off and sleep before another idea arrives.',fx:{energy:25,stress:-19,creativity:-2}},
    {id:'japan',title:'Build the Japan Fund',desc:'Plan Tokyo and stop side quests eating the travel money.',fx:{energy:-4,stress:-3,family:5,cash:16}},
    {id:'hobby',title:'Cards, Games & Anime',desc:'Reset with Xbox, Union Arena, Pokémon or one episode that becomes four.',fx:{energy:-5,stress:-11,family:7,creativity:7,cash:-5}}
  ];
  const EVENTS=[
    {title:'The 7:04 AM Call-In',story:'A message lands before breakfast: tonight\'s shift is suddenly one person lighter.',choices:[
      {name:'Cover it yourself',desc:'Fast and dependable, but Andy pays the full cost.',fx:{energy:-13,stress:11,team:-2,cash:7}},
      {name:'Delegate the solution',desc:'Give the managers ownership and back them properly.',fx:{energy:-4,stress:4,team:12}},
      {name:'Rebuild the plan',desc:'Trim non-essential jobs and protect service.',fx:{energy:-6,stress:5,team:5,cash:-3}}]},
    {title:'The Dinner Question',story:'Becky asks what you want for dinner. The entire management skillset suddenly stops working.',choices:[
      {name:'Make a decision immediately',desc:'A rare display of domestic leadership.',fx:{family:10,stress:-7,cash:-5}},
      {name:'Cook together',desc:'More effort, better night.',fx:{energy:-6,family:15,stress:-9,cash:-8}},
      {name:'Order something',desc:'Easy win. Japan fund takes a small hit.',fx:{family:8,stress:-8,cash:-18}}]},
    {title:'Named Five-Star Review',story:'A guest names one of the team and praises the whole experience.',choices:[
      {name:'Celebrate publicly',desc:'Recognition turns one win into team momentum.',fx:{team:14,stress:-5}},
      {name:'Reward the person privately',desc:'A quieter but meaningful leadership moment.',fx:{team:10,family:2,stress:-4}},
      {name:'Immediately raise the target',desc:'Classic hospitality brain.',fx:{team:-5,stress:8,cash:5}}]},
    {title:'New Project at 1:00 AM',story:'A brilliant new idea appears at the exact time a sensible person would be asleep.',choices:[
      {name:'Write it all now',desc:'Huge creative progress. Tomorrow Andy becomes a ghost.',fx:{creativity:18,energy:-16,stress:8}},
      {name:'Capture five lines and sleep',desc:'The responsible creative build.',fx:{creativity:9,energy:4,stress:-2}},
      {name:'Ignore it',desc:'Sleep wins, but the idea may not return.',fx:{energy:12,stress:-5,creativity:-5}}]},
    {title:'The Wine Cooler Incident',story:'A wine cooler is holding sanitiser spray. Nobody knows why. Everybody knows it has happened before.',choices:[
      {name:'Send the message',desc:'Clear expectation. Slightly terrifying punctuation.',fx:{team:4,stress:4}},
      {name:'Buy proper storage',desc:'Solve the system, not just the symptom.',fx:{team:8,cash:-12,stress:-4}},
      {name:'Move it yourself again',desc:'The problem disappears until tomorrow.',fx:{energy:-4,stress:7,team:-3}}]},
    {title:'Dad, Look What I Made',story:'Quinn reveals a Minecraft build that is confusing, ambitious and secretly brilliant.',choices:[
      {name:'Join the build',desc:'The main quest can wait.',fx:{family:15,stress:-9,creativity:8,energy:-5}},
      {name:'Give him a new challenge',desc:'Quinn gains a side quest. Andy gains peace.',fx:{family:10,creativity:5,stress:-5}},
      {name:'Finish your own objective',desc:'Efficient, but slightly less magical.',fx:{family:-3,creativity:6}}]},
    {title:'Attack on Titan Theory',story:'Isla notices a detail that makes the entire story feel more suspicious.',choices:[
      {name:'Pause and debate it',desc:'The episode becomes a full investigation.',fx:{family:12,creativity:8,stress:-6}},
      {name:'Keep watching',desc:'Answers may arrive. Sleep may not.',fx:{family:8,energy:-7,stress:-5}},
      {name:'Pretend you already knew',desc:'A dangerous bluff.',fx:{family:3,stress:2}}]},
    {title:'Forecast Refocused',story:'The sales forecast changes after the rota is already live.',choices:[
      {name:'Rewrite everything',desc:'Maximum control, minimum remaining patience.',fx:{energy:-12,stress:12,team:-4,cash:10}},
      {name:'Make targeted changes',desc:'Protect service and cut only what matters.',fx:{energy:-6,stress:5,team:5,cash:8}},
      {name:'Trust the original plan',desc:'Bold. Possibly wise. Possibly expensive.',fx:{stress:4,team:3,cash:-10}}]},
    {title:'Binder Treasure',story:'A forgotten Pokémon card looks much more valuable than expected.',choices:[
      {name:'Sell it',desc:'The Japan fund approves.',fx:{cash:28,creativity:-2}},
      {name:'Grade it',desc:'Spend now for a chance at legendary loot later.',fx:{cash:-14,creativity:8,stress:3}},
      {name:'Keep it forever',desc:'Collector logic cannot be defeated.',fx:{creativity:6,family:3}}]}
  ];
  const BOSS_ACTIONS=[
    {id:'delegate',name:'Delegate & Direct',desc:'Use the team properly instead of becoming every role.',damage:29,fx:{energy:-6,stress:4,team:8}},
    {id:'section',name:'Jump on Section',desc:'Huge immediate impact. Huge personal cost.',damage:43,fx:{energy:-16,stress:11,team:3}},
    {id:'guest',name:'Guest Recovery',desc:'Stabilise sentiment and buy the floor breathing room.',damage:23,fx:{energy:-5,stress:-3,team:4,cash:-10}},
    {id:'reset',name:'Five-Minute Reset',desc:'Slow the panic, regroup and make the next move stronger.',damage:13,fx:{energy:5,stress:-10,team:2}}
  ];
  const UPGRADES=[
    {id:'boundaries',name:'Protected Day Off',cost:4,desc:'Start each run with −8 stress.',apply:s=>s.stats.stress-=8},
    {id:'delegation',name:'Trusted Leadership Team',cost:5,desc:'Start each run with +10 team morale.',apply:s=>s.stats.team+=10},
    {id:'home',name:'Family Calendar',cost:5,desc:'Start each run with +10 family connection.',apply:s=>s.stats.family+=10},
    {id:'sleep',name:'Better Sleep Routine',cost:6,desc:'Start each run with +12 energy.',apply:s=>s.stats.energy+=12},
    {id:'spark',name:'Creative Momentum',cost:6,desc:'Start each run with +12 creativity.',apply:s=>s.stats.creativity+=12}
  ];
  const INITIAL={energy:70,stress:20,family:50,team:45,creativity:38,cash:105};
  const freshMeta=()=>({perspective:0,unlocks:[]});
  const freshRun=(meta=freshMeta())=>({version:2,screen:'start',day:0,slot:0,intention:null,stats:{...INITIAL},meta:{...meta,unlocks:[...meta.unlocks]},log:[{title:'Monday Reset',text:'A new week begins. Choose what matters before the week chooses for you.'}],pendingEvent:null,eventDeck:[],actions:0,boss:{active:false,health:100,round:0,defeated:false},ending:null});
  let state=load()||freshRun();
  const app=document.getElementById('app');

  function clamp(){for(const k of Object.keys(META)){const max=META[k].max;state.stats[k]=Math.max(0,Math.min(max,Math.round(state.stats[k]||0)));}}
  function apply(fx={}){for(const [k,v] of Object.entries(fx))state.stats[k]=(state.stats[k]||0)+v;clamp();}
  function log(title,text){state.log.unshift({title,text});state.log=state.log.slice(0,18)}
  function save(show=false){localStorage.setItem(SAVE_KEY,JSON.stringify(state));if(show)toast('Run saved')}
  function load(){try{const x=JSON.parse(localStorage.getItem(SAVE_KEY));return x&&x.version===2?x:null}catch{return null}}
  function fmtFx(k,v){const bad=k==='stress'?v>0:v<0;const sign=v>0?'+':'';return `<span class="fx ${bad?'bad':'good'}">${META[k]?.icon||''} ${sign}${v}</span>`}
  function effects(fx){return Object.entries(fx||{}).map(([k,v])=>fmtFx(k,v)).join('')}
  function top(){if(state.screen==='start')return'';const day=DAYS[Math.min(state.day,6)]||'Run complete',slot=SLOTS[state.slot]||'';return `<header class="top panel"><div><p class="eyebrow">SHIFT//LIFE</p><h2>${day} <span>${slot}</span></h2></div><div class="controls"><span class="pill">✦ ${state.meta.perspective}</span><button class="btn" data-act="save">Save</button><button class="btn ghost" data-act="home">Menu</button></div></header>`}
  function stats(){return `<section class="stats">${Object.entries(META).map(([k,m])=>{const v=state.stats[k],danger=k==='stress'?v>=76:(k!=='cash'&&v<=18),pct=Math.min(100,(v/m.max)*100);return `<article class="stat ${danger?'danger':''}"><div class="stat-head"><span>${m.icon} ${m.label}</span><strong>${k==='cash'?'£':''}${v}</strong></div><div class="meter"><i style="width:${pct}%"></i></div></article>`}).join('')}</section>`}
  function renderStart(){app.innerHTML=`<main>${top()}<section class="hero panel"><p class="eyebrow">A PERSONAL WEEKLY ROGUELITE</p><h1>SHIFT<b>//</b>LIFE</h1><p class="lead">Work. Family. Creativity. Recovery. You cannot maximise everything.</p><p class="copy">Every week is a run through hospitality chaos, family quests, anime nights, Minecraft projects, creative obsessions and the slow road to Japan. Build a life worth keeping.</p><div class="controls"><button class="btn primary" data-act="new">Start a new run</button>${localStorage.getItem(SAVE_KEY)?'<button class="btn" data-act="continue">Continue run</button>':''}</div><div class="meta">${UPGRADES.map(u=>`<span class="tag">${state.meta.unlocks.includes(u.id)?'✓':'🔒'} ${u.name}</span>`).join('')}</div></section><section class="section panel"><div class="section-head"><div><p class="eyebrow">HOW IT WORKS</p><h2>One week. Twenty-one choices. One boss.</h2></div></div><div class="grid"><article class="card" style="cursor:default"><strong>Choose your build</strong><p>Pick a weekly intention and use permanent Perspective upgrades.</p></article><article class="card" style="cursor:default"><strong>Spend your time</strong><p>Every activity improves something and costs something else.</p></article><article class="card" style="cursor:default"><strong>Survive Saturday</strong><p>Defeat the Saturday Night Service boss without burning out.</p></article></div></section></main><footer>Made as a fictionalised game inspired by Andy's real life.</footer>`}
  function renderIntentions(){app.innerHTML=`<main>${top()}<section class="section panel"><div class="section-head"><div><p class="eyebrow">MONDAY RESET</p><h2>Choose this week's intention</h2></div></div><div class="grid">${INTENTIONS.map(i=>`<button class="card" data-intent="${i.id}"><strong>${i.name}</strong><p>${i.desc}</p><div class="effects">${i.chaos?'<span class="tag">???</span>':effects(i.fx)}</div></button>`).join('')}</div></section>${renderUpgrades()}</main>`}
  function renderUpgrades(){const available=UPGRADES.filter(u=>!state.meta.unlocks.includes(u.id));return `<section class="section panel"><div class="section-head"><div><p class="eyebrow">PERMANENT PROGRESSION</p><h2>Spend Perspective</h2></div><span class="pill">✦ ${state.meta.perspective}</span></div>${available.length?`<div class="grid">${available.map(u=>`<button class="card" data-upgrade="${u.id}" ${state.meta.perspective<u.cost?'disabled':''}><strong>${u.name}</strong><p>${u.desc}</p><span class="tag">✦ ${u.cost}</span></button>`).join('')}</div>`:'<div class="notice">Every current permanent upgrade is unlocked.</div>'}</section>`}
  function activityCard(a){return `<button class="card" data-activity="${a.id}"><strong>${a.title}</strong><p>${a.desc}</p><div class="effects">${effects(a.fx)}</div></button>`}
  function renderWeek(){app.innerHTML=`<main>${top()}${stats()}<section class="choice-layout"><section class="section panel"><div class="section-head"><div><p class="eyebrow">CHOOSE ONE</p><h2>How do you spend this part of the day?</h2></div><span class="pill">${state.actions}/21</span></div><div class="activity-grid">${ACTIVITIES.map(activityCard).join('')}</div></section><aside class="timeline panel"><p class="eyebrow">RUN LOG</p><h3>What happened</h3>${state.log.map(x=>`<article><strong>${x.title}</strong><p>${x.text}</p></article>`).join('')}</aside></section></main>`}
  function renderEvent(){const e=state.pendingEvent;app.innerHTML=`<main>${top()}${stats()}<section class="event panel"><p class="eyebrow">LIFE EVENT</p><h2>${e.title}</h2><p class="story">${e.story}</p><div class="grid">${e.choices.map((c,i)=>`<button class="card" data-event-choice="${i}"><strong>${c.name}</strong><p>${c.desc}</p><div>${effects(c.fx)}</div></button>`).join('')}</div></section></main>`}
  function renderBoss(){app.innerHTML=`<main>${top()}${stats()}<section class="event boss panel"><p class="eyebrow">WEEKLY BOSS</p><h2>Saturday Night Service</h2><p class="story">Three hundred covers. The printer is screaming. A walk-in party of eight has arrived. Table 24 has developed a new allergy.</p><div class="bossbar"><div><span>Service Pressure</span><span>${state.boss.health}/100</span></div><div class="meter"><i style="width:${state.boss.health}%"></i></div></div><div class="grid">${BOSS_ACTIONS.map(a=>`<button class="card" data-boss="${a.id}"><strong>${a.name}</strong><p>${a.desc}</p><div><span class="tag">⚔ −${a.damage}</span>${effects(a.fx)}</div></button>`).join('')}</div></section></main>`}
  function ending(){const s=state.stats;if(s.stress>=90||s.energy<=5)return{title:'The Burnout Ending',text:'Andy carried every problem personally until there was nothing left to spend. The next run begins with one lesson: accepting help is also progress.'};if(s.family>=72&&s.team>=60&&s.stress<70)return{title:'The Together Ending',text:'The week was imperfect, but work moved forward and the people Andy loves still felt his presence. This is the rarest successful run.'};if(s.team>=84)return{title:'The Orange Legacy',text:'The team finishes stronger than it started. Problems are being solved without Andy needing to become the solution to everything.'};if(s.creativity>=84)return{title:'Creative Awakening',text:'An idea survived contact with real life and became something tangible. Somewhere beyond the normal world, The Threshold notices.'};if(s.cash>=220)return{title:'Tokyo Gets Closer',text:'The Japan fund survives another week. Neon streets, Pokémon shops and a shared adventure move one step nearer.'};return{title:'Another Week Survived',text:'Nothing was perfectly balanced, but the run continues. Perspective gained is never completely lost.'}}
  function perspective(){const s=state.stats;return Math.max(2,Math.round((s.energy+s.family+s.team+s.creativity-s.stress)/34)+(state.boss.defeated?2:0))}
  function renderEnding(){app.innerHTML=`<main>${top()}${stats()}<section class="ending panel"><p class="eyebrow">RUN COMPLETE</p><h2>${state.ending.title}</h2><p>${state.ending.text}</p><div class="reward">✦ ${state.earned} Perspective gained</div><div class="controls" style="justify-content:center"><button class="btn primary" data-act="new">Begin another run</button><button class="btn" data-act="menu">Main menu</button><button class="btn ghost" data-act="wipe">Delete save</button></div></section></main>`}
  function render(){if(state.screen==='start')renderStart();else if(state.screen==='intent')renderIntentions();else if(state.screen==='week')renderWeek();else if(state.screen==='event')renderEvent();else if(state.screen==='boss')renderBoss();else renderEnding();save()}
  function startNew(){const meta={...state.meta,unlocks:[...state.meta.unlocks]};state=freshRun(meta);state.screen='intent';render()}
  function applyUpgrades(){for(const u of UPGRADES)if(state.meta.unlocks.includes(u.id))u.apply(state);clamp()}
  function chooseIntent(id){const i=INTENTIONS.find(x=>x.id===id);if(!i)return;state.intention=id;applyUpgrades();if(i.chaos){for(const k of Object.keys(META))apply({[k]:Math.floor(Math.random()*31)-10})}else apply(i.fx);log(i.name,i.desc);state.screen='week';render()}
  function chooseActivity(id){const a=ACTIVITIES.find(x=>x.id===id);if(!a)return;apply(a.fx);log(a.title,`${DAYS[state.day]} ${SLOTS[state.slot]}: ${a.desc}`);state.actions++;advance();if(state.screen==='week'&&Math.random()<.42)openEvent();render()}
  function buildDeck(){const pool=[...EVENTS];for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}return pool.map((_,i)=>i)}
  function openEvent(){if(!state.eventDeck.length)state.eventDeck=buildDeck();const idx=state.eventDeck.shift();state.pendingEvent=EVENTS[idx];state.screen='event'}
  function chooseEvent(i){const e=state.pendingEvent,c=e.choices[i];apply(c.fx);log(e.title,`${c.name}: ${c.desc}`);state.pendingEvent=null;state.screen='week';render()}
  function advance(){state.slot++;if(state.slot>=3){state.slot=0;state.day++}if(state.day===5&&state.slot===2&&!state.boss.defeated){state.boss.active=true;state.screen='boss';return}if(state.day>=7)completeRun()}
  function bossAction(id){const a=BOSS_ACTIONS.find(x=>x.id===id);if(!a)return;apply(a.fx);const retaliation=Math.max(3,13-Math.floor(state.stats.team/12));apply({stress:retaliation,energy:-Math.ceil(retaliation/3)});state.boss.health=Math.max(0,state.boss.health-a.damage);state.boss.round++;log(a.name,`Service pressure falls by ${a.damage}. The shift hits back for ${retaliation} stress.`);if(state.boss.health<=0){state.boss.defeated=true;state.boss.active=false;apply({team:14,cash:24,stress:-9});log('Boss defeated','Saturday service lands safely. The team earned the win together.');state.screen='week';advance()}render()}
  function completeRun(){state.ending=ending();state.earned=perspective();state.meta.perspective+=state.earned;state.screen='ending'}
  function buyUpgrade(id){const u=UPGRADES.find(x=>x.id===id);if(!u||state.meta.unlocks.includes(id)||state.meta.perspective<u.cost)return;state.meta.perspective-=u.cost;state.meta.unlocks.push(id);toast(`${u.name} unlocked`);render()}
  function toast(msg){const el=document.createElement('div');el.className='toast';el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),1700)}
  app.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;if(b.dataset.intent)return chooseIntent(b.dataset.intent);if(b.dataset.activity)return chooseActivity(b.dataset.activity);if(b.dataset.eventChoice!==undefined)return chooseEvent(Number(b.dataset.eventChoice));if(b.dataset.boss)return bossAction(b.dataset.boss);if(b.dataset.upgrade)return buyUpgrade(b.dataset.upgrade);switch(b.dataset.act){case'new':startNew();break;case'continue':state=load()||state;render();break;case'save':save(true);break;case'home':case'menu':state.screen='start';render();break;case'wipe':localStorage.removeItem(SAVE_KEY);state=freshRun();render();break;}});
  render();
})();
</script>
</body>
</html>
